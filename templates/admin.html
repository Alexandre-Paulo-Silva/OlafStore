<!DOCTYPE html>
<html>
<head>
    <title>Admin - OlafSec</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<nav>
    <a href="/">Home</a>
    <a href="/products">Produtos</a>
    <a href="/cart">Carrinho</a>
    <a href="/reviews">Comentários</a>
    <a href="/upload">Upload</a>
    <a href="/admin">Admin</a>
    <a href="/search">Busca</a>
    {% if session.username %}
        <span class="user-info">👤 Logado como: {{ session.username }}</span>
        <a href="/logout">Sair</a>
    {% else %}
        <a href="/register">Registrar</a>
        <a href="/login">Login</a>
    {% endif %}
</nav>


<h2>Painel Administrativo</h2>
<p>Adicionar novo produto em destaque:</p>

<form method="POST">
    <label>Nome:</label><br>
    <input type="text" name="name" required><br><br>

    <label>Preço:</label><br>
    <input type="number" step="0.01" name="price" required><br><br>

    <label>Descrição:</label><br>
    <textarea name="description" required></textarea><br><br>

    <label>Imagem (nome do arquivo em /static):</label><br>
    <input type="text" name="image" required><br><br>

    <button type="submit">Adicionar Produto</button>
</form>
</body>
</html>
